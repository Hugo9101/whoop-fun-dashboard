name: Update WHOOP Dashboard

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 07:00 UTC
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check secrets are set
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "WHOOP_CLIENT_ID set: $([ -n "$WHOOP_CLIENT_ID" ] && echo 'YES (length: '${#WHOOP_CLIENT_ID}')' || echo 'NO - EMPTY')"
          echo "WHOOP_CLIENT_SECRET set: $([ -n "$WHOOP_CLIENT_SECRET" ] && echo 'YES (length: '${#WHOOP_CLIENT_SECRET}')' || echo 'NO - EMPTY')"
          echo "WHOOP_REFRESH_TOKEN set: $([ -n "$WHOOP_REFRESH_TOKEN" ] && echo 'YES (length: '${#WHOOP_REFRESH_TOKEN}')' || echo 'NO - EMPTY')"
          echo "DATABASE_URL set: $([ -n "$DATABASE_URL" ] && echo 'YES (length: '${#DATABASE_URL}')' || echo 'NO - EMPTY')"

      - name: Fetch WHOOP data and update Supabase
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 main.py
